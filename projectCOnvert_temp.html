<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .box { border: 2px solid #333; display: inline-block; padding: 20px; border-radius: 10px; }
        input { padding: 10px; width: 100px; margin: 5px; font-size: 1.2rem; }
    </style>
</head>

<body>
    <div class="box">
        <h3>Temperature Converter</h3>

        <input type="number" id="c" placeholder="°C" oninput="convert('c')">
        <span> = </span>
        <input type="number" id="f" placeholder="°F" oninput="convert('f')">
    </div>
    <script>
        function convert(type) {
            const celInput = document.getElementById("c");
            const fahInput = document.getElementById("f");
            if (type === 'c') {
                fahInput.value = celInput.value ? ((celInput.value * 9 / 5) + 32).toFixed(2) : "";
            } else {
                celInput.value = fahInput.value ? ((fahInput.value - 32) * 5 / 9).toFixed(2) : "";
            }
        }
    </script>
    </div>
</body>

</html>
